name: Coverage Summary

on:
  pull_request:
    types: [closed]
    branches: [master]

jobs:
  generate-summary:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run all tests and generate coverage report
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: aosp_atd
          arch: x86_64
          force-avd-creation: true
          disable-animations: true
          emulator-options: -no-window -no-snapshot -noaudio -no-boot-anim -no-metrics
          script: ./gradlew clean testDebugUnitTest connectedDebugAndroidTest jacocoTestReport --stacktrace

      - name: Validate JaCoCo report
        run: |
          if [ ! -f app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml ]; then
            echo "Error: JaCoCo XML report is missing!"
            exit 1
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          fail_ci_if_error: true

      - name: Extract coverage and generate JSON summary
        shell: python
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          import xml.etree.ElementTree as ET
          import json
          import os
          from datetime import datetime

          xml_path = 'app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml'
          
          if not os.path.exists(xml_path):
              print("Error: JaCoCo XML report is missing!")
              exit(1)

          tree = ET.parse(xml_path)
          root = tree.getroot()
          files_coverage = []
          
          # Exclude patterns based on project conventions
          exclude_keywords = ['test', 'androidtest', 'build', 'generated', 'di', 'preview', 'theme']
          
          for package in root.findall('.//package'):
              package_name = package.get('name')
              for sourcefile in package.findall('sourcefile'):
                  file_name = sourcefile.get('name')
                  
                  # Only Kotlin production files
                  if not file_name.endswith('.kt'):
                      continue
                      
                  full_path = f"{package_name}/{file_name}"
                  
                  # Ignore specific paths by checking path segments exactly
                  path_parts = full_path.lower().split('/')
                  if any(part == key for part in path_parts for key in exclude_keywords):
                      continue
                  
                  line_counter = sourcefile.find('counter[@type="LINE"]')
                  if line_counter is not None:
                      missed = int(line_counter.get('missed'))
                      covered = int(line_counter.get('covered'))
                      total = missed + covered
                      coverage = (covered / total * 100) if total > 0 else 100.0
                      
                      files_coverage.append({
                          "file": full_path,
                          "coverage": round(coverage, 2)
                      })
          
          # Sort by ascending coverage
          files_coverage.sort(key=lambda x: x['coverage'])
          
          # Return all files below 80% coverage
          low_coverage = [f for f in files_coverage if f['coverage'] < 80.0]
          
          # If fewer than 20 files are found, return the 20 lowest covered files instead
          result_files = low_coverage
          if len(result_files) < 20:
              result_files = files_coverage[:20]

          summary = {
              "generated_at": datetime.utcnow().isoformat() + "Z",
              "branch": "master",
              "commit": os.environ.get('GITHUB_SHA', 'unknown'),
              "lowest_coverage_files": result_files
          }

          with open('coverage-summary.json', 'w') as f:
              json.dump(summary, f, indent=2)
          
          print(f"Generated coverage-summary.json with {len(result_files)} files.")

      - name: Upload coverage-summary.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage-summary.json
