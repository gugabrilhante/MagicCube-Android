name: Coverage

on:
  workflow_run:
    workflows: ["UI Tests"]
    types:
      - completed

concurrency:
  group: coverage-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  coverage:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Download UI test .ec files before running jacocoTestReport so they are
      # included in executionData. Files are restored to their original paths
      # (app/build/outputs/code_coverage/...) which matches the pattern in build.gradle.
      - name: Download UI test coverage
        uses: actions/download-artifact@v4
        with:
          name: ui-test-coverage
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: '.'

      - name: Get PR number
        id: pr-info
        uses: actions/github-script@v7
        with:
          script: |
            const prs = context.payload.workflow_run.pull_requests;
            return prs && prs.length > 0 ? String(prs[0].number) : '';

      # testDebugUnitTest must run here (not just compileDebugKotlin) because
      # enableUnitTestCoverage=true makes AGP instrument classes at compile time.
      # The .exec IDs match only those instrumented class files, not the plain ones.
      - name: Run unit tests and generate coverage report
        run: ./gradlew testDebugUnitTest jacocoTestReport --stacktrace

      - name: Pre-upload Validation
        run: |
          echo "Checking for JaCoCo XML report..."
          find build/reports/jacoco -name "*.xml"
          if [ -f build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml ]; then
            echo "Report found. Line count:"
            wc -l build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
            echo "First 50 lines:"
            head -n 50 build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          else
            echo "Report NOT found at expected path!"
            ls -R build/reports
            exit 1
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          fail_ci_if_error: true
          verbose: true
          override_commit: ${{ github.event.workflow_run.head_sha }}
          override_pr: ${{ steps.pr-info.outputs.result }}
