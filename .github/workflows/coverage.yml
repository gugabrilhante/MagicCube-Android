name: Coverage

on:
  workflow_run:
    workflows: ["Build", "Unit Tests", "UI Tests"]
    types:
      - completed

concurrency:
  group: coverage-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  coverage:
    # Only run for master branch and when the triggering workflow succeeded.
    # This prevents partial uploads by waiting for test workflows to complete.
    if: >
      github.event.workflow_run.head_branch == 'master' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Debug Info
        run: |
          echo "GITHUB_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}"
          echo "GITHUB_REF: ${{ github.event.workflow_run.head_branch || github.ref }}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate Coverage Report
        # This generates the unit test data and aggregates any available UI test data.
        # It runs clean to ensure a fresh report, which is safe because it runs its own tests.
        run: ./gradlew clean testDebugUnitTest jacocoTestReport --stacktrace

      - name: Pre-upload Validation
        run: |
          echo "Checking for JaCoCo XML report..."
          find app/build/reports/jacoco -name "*.xml"
          if [ -f app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml ]; then
            echo "Report found. Checking content..."
            head -n 50 app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          else
            echo "Report NOT found at expected path!"
            ls -R app/build/reports
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          fail_ci_if_error: true
          verbose: true
