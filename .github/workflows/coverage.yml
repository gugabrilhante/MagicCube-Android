name: Coverage

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_run:
    workflows: ["Build", "Unit Tests", "UI Tests"]
    types:
      - completed

concurrency:
  group: coverage-${{ github.event.pull_request.head.sha || github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  coverage:
    # Trigger on push/PR, or on completion of other workflows on master.
    if: >
      github.event_name != 'workflow_run' || 
      (github.event.workflow_run.head_branch == 'master' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest

    steps:
      - name: Debug Info
        run: |
          echo "Event Name: $GITHUB_EVENT_NAME"
          echo "GITHUB_SHA: ${{ github.event.pull_request.head.sha || github.event.workflow_run.head_sha || github.sha }}"
          echo "GITHUB_REF: $GITHUB_REF"
          if [[ "$GITHUB_EVENT_NAME" == "workflow_run" ]]; then
            echo "Triggering Workflow: ${{ github.event.workflow_run.name }}"
            echo "Triggering Branch: ${{ github.event.workflow_run.head_branch }}"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.event.workflow_run.head_sha || github.sha }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate Coverage Report
        # This generates the unit test data and aggregates any available UI test data.
        # It runs clean to ensure a fresh report, which is safe because it runs its own tests.
        run: ./gradlew clean testDebugUnitTest jacocoTestReport --stacktrace

      - name: Pre-upload Validation
        run: |
          echo "Checking for JaCoCo XML report..."
          find build/reports/jacoco -name "*.xml"
          if [ -f build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml ]; then
            echo "Report found. Checking content..."
            head -n 50 build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          else
            echo "Report NOT found at expected path!"
            ls -R build/reports
            exit 1
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          fail_ci_if_error: true
          verbose: true
