name: Coverage

on:
  workflow_run:
    workflows: ["Build", "Unit Tests", "UI Tests"]
    types:
      - completed
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  coverage:
    # Only run if the triggering workflows were successful (if triggered by workflow_run)
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate Coverage Report
        # This generates the unit test data and aggregates any available UI test data
        run: ./gradlew clean testDebugUnitTest jacocoTestReport --stacktrace

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          fail_ci_if_error: true
