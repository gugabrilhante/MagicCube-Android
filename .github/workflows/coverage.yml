name: Coverage

on:
  workflow_run:
    workflows: ["UI Tests"]
    types:
      - completed

concurrency:
  group: coverage-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  coverage:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download UI test coverage
        uses: actions/download-artifact@v4
        with:
          name: ui-test-coverage
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: '.'

      - name: Find unit test run ID and PR number
        id: meta
        uses: actions/github-script@v7
        with:
          script: |
            const headSha = context.payload.workflow_run.head_sha;

            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'unit_test.yml',
              head_sha: headSha,
              status: 'completed'
            });

            const run = data.workflow_runs.find(r => r.conclusion === 'success');
            if (!run) core.setFailed(`No successful unit_test.yml run found for ${headSha}`);
            core.setOutput('unit-run-id', run.id);

            const prs = context.payload.workflow_run.pull_requests;
            core.setOutput('pr-number', prs && prs.length > 0 ? String(prs[0].number) : '');

      - name: Download unit test coverage
        uses: actions/download-artifact@v4
        with:
          name: unit-test-coverage
          run-id: ${{ steps.meta.outputs.unit-run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: '.'

      - name: Compile debug sources
        run: ./gradlew compileDebugKotlin --stacktrace

      - name: Generate Coverage Report
        run: ./gradlew jacocoTestReport -x testDebugUnitTest --stacktrace

      - name: Pre-upload Validation
        run: |
          echo "Checking for JaCoCo XML report..."
          find build/reports/jacoco -name "*.xml"
          if [ -f build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml ]; then
            echo "Report found. Checking content..."
            head -n 50 build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          else
            echo "Report NOT found at expected path!"
            ls -R build/reports
            exit 1
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          fail_ci_if_error: true
          verbose: true
          override_commit: ${{ github.event.workflow_run.head_sha }}
          override_pr: ${{ steps.meta.outputs.pr-number }}
