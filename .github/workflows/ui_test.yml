name: UI Tests

on:
  pull_request:
    branches: [ master ]

jobs:
  ui-tests:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run UI tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: arm64-v8a
          profile: Nexus 6
          disable-animations: true
          emulator-options: -no-window -no-snapshot -noaudio -no-boot-anim -no-metrics
          script: ./gradlew connectedDebugAndroidTest --no-parallel --max-workers=1
