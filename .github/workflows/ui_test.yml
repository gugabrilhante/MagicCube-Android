name: UI Tests

on:
  pull_request:
    branches: [ master ]

jobs:
  ui-tests:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run UI tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: Nexus 6
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -memory 3072 -cores 4
          script: ./gradlew connectedDebugAndroidTest --no-parallel --max-workers=1 -Dorg.gradle.projectcachedir=/tmp/gradle-cache

      - name: Upload UI test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-report
          path: app/build/reports/androidTests/connected/
